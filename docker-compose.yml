# ─────────────────────────────────────────────────────────
# Legal Case Manager – Docker Compose (SQLite / Offline Mode)
#
# Usage:
#   1. Copy .env.docker to .env in this directory, or set vars inline
#   2. docker compose up --build
#   3. Open http://localhost:3000
#
# Data is stored in the ./data/ volume mount (SQLite DB + uploads).
# No Postgres, Redis, or external services required.
# ─────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legalcm_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      # Persistent storage: SQLite database + uploaded files
      - ./data/storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The Next.js rewrite proxy forwards /api/* to the backend
        # inside the Docker network. Browser never talks to backend directly.
        NEXT_PUBLIC_API_URL: http://backend:8080
    container_name: legalcm_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
